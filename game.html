<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>【無料】マックで遊ぶ暇つぶしジャンプゲーム</title>
    <style>
        body { text-align: center; font-family: sans-serif; background: #f0f0f0; margin-top: 50px; touch-action: manipulation; }
        canvas { background: #fff; border: 2px solid #333; display: block; margin: 0 auto; max-width: 100%; height: auto; }
        h1 { color: #333; font-size: 24px; }
        p { color: #666; font-size: 14px; }
    </style>
</head>
<body>

    <h1>暇つぶしジャンプゲーム</h1>
    <p>画面をタップ（クリック）して障害物をジャンプで避けろ！</p>
    <canvas id="gameCanvas" width="600" height="200"></canvas>
    <h2 id="scoreLabel">Score: 0</h2>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // プレイヤー（青い四角）
        let player = { x: 50, y: 150, size: 30, dy: 0, gravity: 0.6, jumpForce: -10, isGrounded: false };
        // 障害物（赤い四角）
        let obstacle = { x: 600, y: 150, size: 30, speed: 5 };
        let score = 0;
        let isGameOver = false;

        // ジャンプの処理を関数にまとめる
        function handleJump(e) {
            if (e) e.preventDefault(); // スマホでダブルタップした時にズームするのを防ぐ
            
            if (player.isGrounded && !isGameOver) {
                player.dy = player.jumpForce;
                player.isGrounded = false;
            }
            if (isGameOver) { resetGame(); }
        }

        // パソコン用のクリックイベント
        window.addEventListener("mousedown", handleJump);
        // スマホ用のタップイベント（ここを追加！）
        window.addEventListener("touchstart", handleJump, { passive: false });

        function resetGame() {
            player.y = 150; player.dy = 0; player.isGrounded = true;
            obstacle.x = 600; obstacle.speed = 5;
            score = 0; isGameOver = false;
            loop();
        }

        function loop() {
            if (isGameOver) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            player.dy += player.gravity;
            player.y += player.dy;

            if (player.y >= 150) {
                player.y = 150;
                player.dy = 0;
                player.isGrounded = true;
            }

            obstacle.x -= obstacle.speed;
            if (obstacle.x < -obstacle.size) {
                obstacle.x = 600;
                score++;
                obstacle.speed += 0.5;
                document.getElementById("scoreLabel").innerText = "Score: " + score;
            }

            if (obstacle.x < player.x + player.size &&
                obstacle.x + obstacle.size > player.x &&
                obstacle.y < player.y + player.size) {
                isGameOver = true;
                ctx.fillStyle = "black";
                ctx.font = "24px sans-serif";
                ctx.fillText("GAME OVER (タップでリスタート)", 80, 110);
                return;
            }

            ctx.fillStyle = "#007AFF";
            ctx.fillRect(player.x, player.y, player.size, player.size);

            ctx.fillStyle = "#FF3B30";
            ctx.fillRect(obstacle.x, obstacle.y, obstacle.size, obstacle.size);

            ctx.fillStyle = "#333";
            ctx.fillRect(0, 180, canvas.width, 2);

            requestAnimationFrame(loop);
        }

        resetGame();
    </script>
</body>
</html>
